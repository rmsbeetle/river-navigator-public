name: 🐞 Сообщить о проблеме (Русский)
description: Что-то не работает, зависает или неверно показывает
title: "[Баг]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Спасибо, что помогаете улучшить **River Navigator**! Заполните, что сможете — даже пара строк уже помогает.
  - type: textarea
    id: what-happened
    attributes:
      label: Что произошло?
      description: Опишите проблему и что вы ожидали увидеть вместо этого
      placeholder: "Например: включил авиарежим, а скачанная карта не открывается — пустой экран"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Как повторить?
      description: Шаги, после которых появляется проблема
      placeholder: |
        1. Открыл маршрут
        2. Нажал «Старт»
        3. Заблокировал экран
        4. ...
    validations:
      required: false
  - type: input
    id: app-version
    attributes:
      label: Версия приложения
      description: Видна в TestFlight под названием приложения
      placeholder: "1.0 (2)"
    validations:
      required: false
  - type: input
    id: device
    attributes:
      label: Устройство и версия iOS
      placeholder: "iPhone 13, iOS 18.5"
    validations:
      required: false
  - type: textarea
    id: media
    attributes:
      label: Скриншоты или видео (необязательно)
      description: Перетащите файлы прямо в это поле
    validations:
      required: false
