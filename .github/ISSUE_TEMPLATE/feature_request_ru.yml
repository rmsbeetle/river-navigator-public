name: 💡 Предложить улучшение (Русский)
description: Идея новой функции или улучшения
title: "[Идея]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: Что предлагаете?
      description: Опишите идею и какую задачу на воде она решает
      placeholder: "Например: показывать на карте расстояние до следующей точки крупной цифрой"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Дополнительно (необязательно)
      description: Любой контекст, примеры, скриншоты
    validations:
      required: false
