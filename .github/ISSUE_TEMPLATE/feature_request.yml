name: 💡 Suggest an improvement
description: An idea for a new feature or improvement
title: "[Idea]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: What do you suggest?
      description: Describe the idea and what problem on the water it solves
      placeholder: "For example: show the distance to the next point in big numbers on the map"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Anything else (optional)
      description: Any context, examples, screenshots
    validations:
      required: false
